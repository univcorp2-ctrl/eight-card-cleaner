[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "eight-card-cleaner"
version = "0.1.0"
description = "Clean and normalize Eight exported business card CSV files."
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "Generated by GitHub-GPT Syncer" }]
license = { text = "MIT" }
dependencies = [
  "pandas>=2.0.0"
]

[project.optional-dependencies]
excel = ["openpyxl>=3.1.0"]
dev = ["pytest>=8.0.0"]

[project.scripts]
eight-card-cleaner = "eight_card_cleaner.cleaner:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
